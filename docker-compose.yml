version: '3.8'

services:
  web:
    build: .
    container_name: awsservers-web
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    # Nginx Proxy Manager handles routing to port 5000 internally
    command: waitress-serve --threads=2 --port=5000 app:app
    networks:
      - zst-gateway

networks:
  zst-gateway:
    external: true
