version: '3.8'

services:
  web:
    build: .
    container_name: awsservers-web
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CASHFREE_APP_ID=${CASHFREE_APP_ID}
      - CASHFREE_SECRET_KEY=${CASHFREE_SECRET_KEY}
      - CASHFREE_ENV=${CASHFREE_ENV}
    # Nginx Proxy Manager handles routing to port 5000 internally
    command: waitress-serve --threads=2 --port=5000 app:app
    networks:
      - zst-gateway

networks:
  zst-gateway:
    external: true
