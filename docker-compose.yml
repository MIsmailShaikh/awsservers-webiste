version: '3.8'

services:
  web:
    build: .
    container_name: awsservers-web
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USE_TLS=${MAIL_USE_TLS}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER}
    # Nginx Proxy Manager handles routing to port 5000 internally
    command: waitress-serve --threads=8 --port=5000 app:app
    networks:
      - zst-gateway

networks:
  zst-gateway:
    external: true
