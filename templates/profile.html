<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Complete Profile — AVPSSERVER</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/avpsserverlogo.png') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"Space Grotesk"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: '#673de7',
            hero: '#1e0f47',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex min-h-screen items-center justify-center p-6">
  
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 md:p-10 border border-slate-100">
    <div class="flex justify-center mb-6">
      <img src="{{ url_for('static', filename='images/avpsserverlogo.png') }}" alt="Logo" class="h-12 w-auto">
    </div>
    
    <h1 class="text-2xl font-bold text-center text-slate-900 mb-2">Complete Your Profile</h1>
    <p class="text-slate-500 text-center text-sm mb-8">Please enter your billing details to proceed with your payment.</p>
    
    <form method="POST" action="/profile" class="space-y-5">
      <div>
        <label for="full_name" class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
        <input type="text" id="full_name" name="full_name" required value="{{ user.full_name or '' }}"
               class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary shadow-sm transition-colors"
               placeholder="John Doe">
      </div>
      
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
        <input type="email" id="email" name="email" required value="{{ user.email or '' }}"
               class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary shadow-sm transition-colors"
               placeholder="john@example.com">
      </div>
      
      <div>
        <label for="phone" class="block text-sm font-semibold text-slate-700 mb-1">Phone Number</label>
        <input type="tel" id="phone" name="phone" required value="{{ user.phone or '' }}"
               class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary shadow-sm transition-colors"
               placeholder="+91 9876543210">
      </div>
      
            <div>
        <label for="company_name" class="block text-sm font-semibold text-slate-700 mb-1">Company Name (Optional)</label>
        <input type="text" id="company_name" name="company_name" value="{{ user.company_name or '' }}"
               class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary shadow-sm transition-colors"
               placeholder="Acme Corp">
      </div>
      
      <div class="pt-2">
        <button type="submit" class="w-full inline-flex justify-center items-center gap-2 bg-primary text-white px-5 py-3.5 rounded-xl font-bold hover:bg-indigo-600 shadow-lg shadow-primary/25 transition-all active:scale-95">
          Save & Continue
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </form>
  </div>
  
</body>
</html>
