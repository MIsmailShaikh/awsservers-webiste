<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment Success — AVPSSERVER</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/avpsserverlogo.png') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { primary: '#673de7' }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex min-h-screen flex-col items-center justify-center p-6">
  
  <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100">
    <div class="bg-emerald-500 p-8 flex flex-col items-center justify-center text-white">
      <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mb-4">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h1 class="text-3xl font-bold">Payment Successful!</h1>
      <p class="text-emerald-50 mt-1 opacity-90">Your transaction has been processed.</p>
    </div>
    
    <div class="p-8">
      <div class="flex justify-between items-center py-4 border-b border-slate-100">
        <span class="text-slate-500 font-medium text-sm">Order ID</span>
        <span class="font-bold text-slate-900 font-mono text-sm">{{ tx.order_id }}</span>
      </div>
      
      <div class="flex justify-between items-center py-4 border-b border-slate-100">
        <span class="text-slate-500 font-medium text-sm">Amount Paid</span>
        <span class="font-bold text-slate-900 text-lg">₹{{ "{:,.2f}".format(tx.amount) }}</span>
      </div>
      
      <div class="flex justify-between items-center py-4 border-b border-slate-100">
        <span class="text-slate-500 font-medium text-sm">Date</span>
        <span class="font-bold text-slate-900 text-sm">{{ tx.created_at.strftime('%B %d, %Y') }}</span>
      </div>
      
      <div class="mt-8 flex flex-col sm:flex-row gap-3">
        <a href="/download-invoice/{{ tx.order_id }}" target="_blank" class="flex-1 inline-flex justify-center items-center gap-2 bg-slate-100 text-slate-700 px-5 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Invoice
        </a>
        <a href="/dashboard" class="flex-1 inline-flex justify-center items-center gap-2 bg-primary text-white px-5 py-3 rounded-xl font-bold hover:bg-indigo-600 shadow-lg shadow-primary/25 transition-all">
          Go to Dashboard
        </a>
      </div>
    </div>
  </div>
  
</body>
</html>
